name: xiaoliuyiji
description: 小六印记 - 社交日记应用

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  get: ^4.6.6
  
  # 网络请求
  dio: ^5.4.0
  
  # 本地存储
  shared_preferences: ^2.2.2
  get_storage: ^2.1.1
  
  # Socket.io
  socket_io_client: ^2.0.3+1
  
  # UI组件
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  flutter_slidable: ^3.0.1
  flutter_sticky_header: ^0.6.5
  
  # 工具
  intl: ^0.18.1
  uuid: ^4.3.3
  json_annotation: ^4.8.1
  logger: ^2.0.2
  
  # 日历/日期
  table_calendar: ^3.0.9
  flutter_calendar_carousel: ^2.4.3
  
  # 表情/富文本
  emoji_picker_flutter: ^1.6.4
  flutter_quill: ^8.4.3
  
  # 动画
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  
  # 图表/统计
  fl_chart: ^0.66.0
  
  # 图片处理
  photo_view: ^0.14.0
  image_cropper: ^5.0.1
  
  # 地图/位置
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
